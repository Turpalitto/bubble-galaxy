<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d0221"/>
      <stop offset="100%" stop-color="#150830"/>
    </linearGradient>
    <radialGradient id="b" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#FF3B5C"/>
    </radialGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <!-- HUD mock -->
  <rect x="40" y="30" width="200" height="60" rx="12" fill="#ffffff10" stroke="#a855f7" stroke-width="1"/>
  <text x="60" y="55" font-family="Arial" font-size="14" fill="#a78bfa">ОЧКИ</text>
  <text x="60" y="80" font-family="Arial Black" font-size="24" fill="#fff">12 450</text>
  <rect x="540" y="30" width="200" height="60" rx="12" fill="#ffffff10" stroke="#a855f7" stroke-width="1"/>
  <text x="640" y="70" text-anchor="middle" font-family="Arial Black" font-size="28" fill="#fff">Уровень 3</text>
  <!-- grid -->
