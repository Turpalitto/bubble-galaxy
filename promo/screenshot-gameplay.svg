    <!-- aim line -->
    <line x1="300" y1="420" x2="300" y2="200" stroke="#fff" stroke-width="2" opacity="0.3" stroke-dasharray="8 6"/>
    <circle cx="300" cy="420" r="26" fill="url(#b)"/>
    <polygon points="300,175 290,195 310,195" fill="#FF3B5C"/>
  </g>
  <text x="640" y="680" text-anchor="middle" font-family="Arial" font-size="22" fill="#7c3aed">Геймплей - стреляй, собирай комбо, используй спецпузыри</text>
</svg>
