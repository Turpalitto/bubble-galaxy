      <circle cx="180" cy="60" r="22" fill="#34C759"/><circle cx="230" cy="60" r="22" fill="#007AFF"/>
      <circle cx="280" cy="60" r="22" fill="#AF52DE"/><circle cx="330" cy="60" r="22" fill="#FF9500"/>
      <circle cx="380" cy="60" r="22" fill="#FF2D55"/><circle cx="430" cy="60" r="22" fill="#FF3B5C"/>
      <circle cx="105" cy="100" r="22" fill="#FFCC00"/><circle cx="155" cy="100" r="22" fill="#007AFF"/>
      <circle cx="205" cy="100" r="22" fill="#34C759"/><circle cx="255" cy="100" r="22" fill="#AF52DE"/>
      <circle cx="305" cy="100" r="22" fill="#FF9500"/><circle cx="355" cy="100" r="22" fill="#FF3B5C"/>
      <circle cx="405" cy="100" r="22" fill="#FFCC00"/>
      <circle cx="80" cy="140" r="22" fill="#34C759"/><circle cx="130" cy="140" r="22" fill="#FF3B5C"/>
      <circle cx="180" cy="140" r="22" fill="#FFCC00"/><circle cx="230" cy="140" r="22" fill="#AF52DE"/>
